from pathlib import Path

html = """<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Timer</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
}

.container{
display:flex;
height:100vh;
position:relative;
}

.side{
width:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
transition:0.4s;
}

.left{
background:black;
color:white;
}

.right{
background:white;
color:black;
}

h1{
font-size:64px;
margin-bottom:20px;
}

.time{
font-size:90px;
font-weight:bold;
}

.controls{
position:absolute;
bottom:35px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:15px;
padding:16px 20px;
border-radius:28px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
}

button{
padding:14px 24px;
border-radius:18px;
border:none;
font-size:18px;
cursor:pointer;
transition:0.2s;
}

button:hover{
opacity:0.8;
}

.active{
background:white !important;
color:black !important;
}

.start-btn{
min-width:120px;
}

.top-btn{
position:absolute;
top:20px;
width:55px;
height:55px;
border-radius:50%;
border:none;
font-size:28px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
z-index:100;
}

.theme-btn{
right:20px;
}

.settings-btn{
right:85px;
}

.panel{
position:absolute;
top:90px;
width:280px;
padding:18px;
border-radius:20px;
background:rgba(0,0,0,0.85);
display:none;
flex-direction:column;
gap:12px;
z-index:100;
}

.theme-panel{
right:20px;
}

.settings-panel{
right:85px;
}

.panel button{
padding:12px;
border-radius:12px;
font-size:15px;
}

.color-picker,
.setting-row{
display:flex;
justify-content:space-between;
align-items:center;
color:white;
gap:10px;
}

input[type="color"],
input[type="number"]{
width:80px;
height:40px;
border:none;
border-radius:10px;
padding:5px;
}

.apply-btn{
background:white;
color:black;
font-weight:bold;
}
</style>
</head>

<body>

<button class="top-btn settings-btn" onclick="toggleSettings()">⚙️</button>
<button class="top-btn theme-btn" onclick="toggleThemes()">🎨</button>

<div class="panel theme-panel" id="themePanel">

<button onclick="setTheme('#0b3d2e','#f5e6c8')">
أخضر غامق + بيج
</button>

<button onclick="setTheme('#6fa8dc','#d9d9d9')">
أزرق هادئ + رمادي فاتح
</button>

<button onclick="setTheme('#000000','#ffffff')">
أسود + أبيض
</button>

<div class="color-picker">
<span>لون اليسار</span>
<input type="color" id="leftPicker" value="#000000">
</div>

<div class="color-picker">
<span>لون اليمين</span>
<input type="color" id="rightPicker" value="#ffffff">
</div>

<button class="apply-btn" onclick="applyCustomColors()">
تطبيق الألوان
</button>

</div>

<div class="panel settings-panel" id="settingsPanel">

<div class="setting-row">
<span>Focus (min)</span>
<input type="number" id="focusInput" value="30" min="1">
</div>

<div class="setting-row">
<span>Break (min)</span>
<input type="number" id="breakInput" value="5" min="1">
</div>

<button class="apply-btn" onclick="applyTimes()">
تطبيق الوقت
</button>

</div>

<div class="container">

<div class="side left" id="leftSide">
<h1>Focus</h1>
<div class="time" id="focusTime">30:00</div>
</div>

<div class="side right" id="rightSide">
<h1>Break</h1>
<div class="time" id="breakTime">05:00</div>
</div>

<div class="controls">
<button id="focusBtn" onclick="selectFocus()">Focus</button>
<button id="breakBtn" onclick="selectBreak()">Break</button>
<button id="startBtn" class="start-btn" onclick="toggleTimer()">Start</button>
</div>

</div>

<script>

let focusSeconds = 30 * 60;
let breakSeconds = 5 * 60;

let currentMode = "focus";
let currentSeconds = focusSeconds;

let running = false;
let timer = null;

const focusTime = document.getElementById("focusTime");
const breakTime = document.getElementById("breakTime");

const focusBtn = document.getElementById("focusBtn");
const breakBtn = document.getElementById("breakBtn");
const startBtn = document.getElementById("startBtn");

function formatTime(sec){

const m = Math.floor(sec / 60);
const s = sec % 60;

return String(m).padStart(2,"0")
+ ":" +
String(s).padStart(2,"0");
}

function updateDisplay(){

if(currentMode === "focus"){

focusTime.textContent = formatTime(currentSeconds);
breakTime.textContent = formatTime(breakSeconds);

}else{

breakTime.textContent = formatTime(currentSeconds);
focusTime.textContent = formatTime(focusSeconds);

}
}

function setActiveButton(){

focusBtn.classList.remove("active");
breakBtn.classList.remove("active");

if(currentMode === "focus"){
focusBtn.classList.add("active");
}else{
breakBtn.classList.add("active");
}
}

function selectFocus(){

clearInterval(timer);

running = false;
startBtn.textContent = "Start";

currentMode = "focus";
currentSeconds = focusSeconds;

setActiveButton();
updateDisplay();
}

function selectBreak(){

clearInterval(timer);

running = false;
startBtn.textContent = "Start";

currentMode = "break";
currentSeconds = breakSeconds;

setActiveButton();
updateDisplay();
}

function toggleTimer(){

if(running){

clearInterval(timer);

running = false;
startBtn.textContent = "Start";

}else{

running = true;
startBtn.textContent = "Pause";

timer = setInterval(()=>{

currentSeconds--;

if(currentSeconds <= 0){

clearInterval(timer);

running = false;
startBtn.textContent = "Start";
currentSeconds = 0;

}

updateDisplay();

},1000);

}
}

function toggleThemes(){

const panel = document.getElementById("themePanel");

panel.style.display =
panel.style.display === "flex"
? "none"
: "flex";
}

function toggleSettings(){

const panel = document.getElementById("settingsPanel");

panel.style.display =
panel.style.display === "flex"
? "none"
: "flex";
}

function getTextColor(hex){

hex = hex.replace("#","");

const r = parseInt(hex.substring(0,2),16);
const g = parseInt(hex.substring(2,4),16);
const b = parseInt(hex.substring(4,6),16);

const brightness =
(r * 299 + g * 587 + b * 114) / 1000;

return brightness > 150
? "black"
: "white";
}

function setTheme(left,right){

const leftSide =
document.getElementById("leftSide");

const rightSide =
document.getElementById("rightSide");

leftSide.style.background = left;
rightSide.style.background = right;

leftSide.style.color =
getTextColor(left);

rightSide.style.color =
getTextColor(right);
}

function applyCustomColors(){

const left =
document.getElementById("leftPicker").value;

const right =
document.getElementById("rightPicker").value;

setTheme(left,right);
}

function applyTimes(){

const focusMin =
parseInt(document.getElementById("focusInput").value);

const breakMin =
parseInt(document.getElementById("breakInput").value);

focusSeconds = focusMin * 60;
breakSeconds = breakMin * 60;

if(currentMode === "focus"){
currentSeconds = focusSeconds;
}else{
currentSeconds = breakSeconds;
}

updateDisplay();
}

setTheme("#000000","#ffffff");
setActiveButton();
updateDisplay();

</script>

</body>
</html>
"""

path = Path("/mnt/data/pomodoro_timer_full_custom.html")
path.write_text(html, encoding="utf-8")

print(f"File saved: {path}")
